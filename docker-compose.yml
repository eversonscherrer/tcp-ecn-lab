services:
  server:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: accecn-server
    hostname: server
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      # ECN sysctls applied per-container. Override at runtime via scripts.
      net.ipv4.tcp_ecn: 1
      net.ipv4.tcp_ecn_fallback: 1
    networks:
      labnet:
        ipv4_address: 10.99.0.10
    volumes:
      - ./scripts:/experiment/scripts:ro
      - ./results:/experiment/results
    command: ["sleep", "infinity"]

  client:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: accecn-client
    hostname: client
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.tcp_ecn: 1
      net.ipv4.tcp_ecn_fallback: 1
    networks:
      labnet:
        ipv4_address: 10.99.0.20
    volumes:
      - ./scripts:/experiment/scripts:ro
      - ./results:/experiment/results
    depends_on:
      - server
    command: ["sleep", "infinity"]

networks:
  labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24
